<!doctype html>
<!-- index.html -->
<!-- Main HTML file for the RestaurantHub application.
     This file serves as the entry point for the React app. -->

<html lang="en">
  <head>
    <!-- Character encoding for proper text display -->
    <meta charset="UTF-8" />

    <!-- Website icon displayed in browser tab -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Ensures responsive design on different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title displayed in browser tab -->
    <title>RestaurantHub</title>
  </head>

  <body>

    <!-- Root container where React will render the application -->
    <div id="root"></div>

    <!-- Main JavaScript file that loads the React app -->
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
